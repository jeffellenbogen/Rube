<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rube Goldberg Planner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header id="toolbar">
    <input id="team-name" type="text" value="Team Name" spellcheck="false">
    <div class="toolbar-actions">
      <button id="btn-undo" disabled>Undo</button>
      <button id="btn-redo" disabled>Redo</button>
      <button id="btn-download">Download</button>
      <label id="btn-upload">Upload<input type="file" accept="image/png" hidden></label>
    </div>
  </header>
  <main>
    <aside id="library">
      <section class="lib-section" id="lib-machines">
        <h3>Simple Machines <button class="collapse-btn">▾</button></h3>
        <div class="lib-items"></div>
      </section>
      <section class="lib-section" id="lib-materials">
        <h3>Materials <button class="collapse-btn">▾</button></h3>
        <div class="lib-items"></div>
      </section>
      <section class="lib-section" id="lib-environment">
        <h3>Environment <button class="collapse-btn">▾</button></h3>
        <div class="lib-items"></div>
      </section>
    </aside>
    <div id="canvas-wrapper">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <g id="layer-environment"></g>
        <g id="layer-materials"></g>
        <g id="layer-machines"></g>
        <g id="layer-connections"></g>
        <g id="layer-ui"></g>
      </svg>
      <div id="comment-overlays"></div>
    </div>
    <aside id="tracker">
      <h3>Requirements</h3>
      <ul id="machine-checklist"></ul>
      <div id="step-counter"></div>
      <h3>Bill of Materials</h3>
      <ul id="bom-list"></ul>
      <div id="version-label">v2.3.59</div>
    </aside>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
